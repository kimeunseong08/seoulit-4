<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 MBTI 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 시작 화면 -->
        <div id="start-screen" class="screen">
            <h1>✨ 나의 MBTI 테스트 ✨</h1>
            <p>간단한 4가지 질문으로 나의 성향을 알아보세요!</p>
            <button id="start-btn">테스트 시작하기</button>
        </div>

        <!-- 질문 화면 -->
        <div id="question-screen" class="screen hidden">
            <div class="progress-bar">
                <div id="progress" style="width: 0%;"></div>
            </div>
            <h2 id="question-text">질문이 여기에 표시됩니다.</h2>
            <div class="options">
                <button id="option-a" class="option-btn">선택지 A</button>
                <button id="option-b" class="option-btn">선택지 B</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="screen hidden">
            <h2>당신의 MBTI 결과는?</h2>
            <div id="mbti-result" class="mbti-type">ESTJ</div>
            <p id="result-desc">결과 설명이 여기에 표시됩니다.</p>
            <button id="restart-btn">다시 테스트하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
